name: Validate PNPK packets

on:
  push:
    paths:
      - "**/*.pnpk"
      - "scripts/validate-pnpk.mjs"
      - "schema/**"
      - "extensions/**"
      - ".github/workflows/validate-pnpk.yml"
  pull_request:
    paths:
      - "**/*.pnpk"
      - "scripts/validate-pnpk.mjs"
      - "schema/**"
      - "extensions/**"
      - ".github/workflows/validate-pnpk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate approved PNPK examples
        run: node scripts/validate-pnpk.mjs examples

      - name: Prove unverified legal process is rejected
        shell: bash
        run: |
          if node scripts/validate-pnpk.mjs negative-examples/blocked-unverified-legal-process.pnpk; then
            echo "Expected the unverified legal-process packet to fail validation."
            exit 1
          fi
          echo "Blocked legal-process example was rejected as expected."
