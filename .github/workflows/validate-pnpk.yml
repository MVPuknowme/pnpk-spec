name: Validate PNPK packets

on:
  push:
    paths:
      - "**/*.pnpk"
      - "scripts/validate-pnpk.mjs"
      - "schema/**"
      - "extensions/**"
      - ".github/workflows/validate-pnpk.yml"
  pull_request:
    paths:
      - "**/*.pnpk"
      - "scripts/validate-pnpk.mjs"
      - "schema/**"
      - "extensions/**"
      - ".github/workflows/validate-pnpk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate PNPK examples
        run: node scripts/validate-pnpk.mjs examples
